<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact me</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.3/css/all.css"
      integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-contact">
      <div class="sub-container">
        <header>
          <nav class="nav-top">
            <div class="icon">
              <img src="../images/logo.jpg" alt="" />
              <div class="name">
                <h3><a href="../index.html">William Mallak</a></h3>
                <h6><a href="../index.html">Web Developer and designer</a></h6>
              </div>
            </div>
            <ul>
              <li><a href="../about/about.html">ABOUT ME</a></li>
              <li><a href="../projects/projects.html">PROJECTS</a></li>
              <li><a href="../contact/contact-me.html">CONTACT</a></li>
            </ul>
          </nav>
          <div class="burger-menu">
            <input type="checkbox" id="checkbox_burger" />
            <label for="checkbox_burger"
              ><i class="fas fa-bars" aria-hidden="true"></i
            ></label>
            <ul class="burger__list">
              <li class="burger__item">
                <a href="../about/about.html" class="burger__link">ABOUT ME</a>
              </li>
              <li class="burger__item">
                <a href="../projects/projects.html" class="burger__link"
                  >PROJECTS</a
                >
              </li>
              <li class="burger__item">
                <a href="../contact/contact-me.html" class="burger__link"
                  >Contact Me</a
                >
              </li>
            </ul>
          </div>
        </header>

        <form action="https://formspree.io/f/xnqleqrk">
          <div class="form-container">
            <div class="info first-name">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" name="first name" />
              <label for="second-name">second Name</label>
              <input type="text" id="second-name" name="second name" />
            </div>
            <div class="info email">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" />
              <label for="company-name">Company Name</label>
              <input type="text" id="company-name" name="company name" />
            </div>
          </div>
          <div class="message">
            <label for="message"></label>
            <textarea
              name="message"
              id="message"
              cols="83"
              rows="10"
              placeholder="Please enter your message"
            ></textarea>
          </div>
          <div class="submit">
            <input type="submit" value="send" />
            <input type="reset" value="reset" />
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
